<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-RAG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }

        .header { background: #1a1a2e; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header span { font-size: 13px; color: #aaa; }

        .tabs { display: flex; background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 24px; }
        .tab { padding: 12px 20px; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; transition: all .2s; }
        .tab:hover { color: #333; }
        .tab.active { color: #1a1a2e; border-bottom-color: #1a1a2e; font-weight: 500; }

        .panel { display: none; max-width: 900px; margin: 24px auto; padding: 0 24px; }
        .panel.active { display: block; }

        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 20px; margin-bottom: 16px; }
        .card h3 { font-size: 15px; margin-bottom: 12px; color: #1a1a2e; }

        .upload-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all .2s; }
        .upload-zone:hover { border-color: #1a1a2e; background: #fafafa; }
        .upload-zone.dragover { border-color: #1a1a2e; background: #f0f0ff; }
        .upload-zone p { color: #888; font-size: 14px; margin-top: 8px; }
        .upload-zone input { display: none; }

        .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all .2s; }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-primary:hover { background: #2d2d4e; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

        .result-box { background: #f8f9fa; border-radius: 6px; padding: 12px 16px; font-size: 13px; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; display: none; }
        .result-box.show { display: block; }
        .result-box.error { background: #fff0f0; color: #c00; }

        /* Chat */
        .chat-messages { height: 500px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; background: #fafafa; margin-bottom: 12px; }
        .msg { margin-bottom: 12px; display: flex; }
        .msg.user { justify-content: flex-end; }
        .msg .bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .msg.user .bubble { background: #1a1a2e; color: #fff; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble { background: #fff; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .chat-input-row input:focus { border-color: #1a1a2e; }

        /* Locate */
        .locate-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .locate-input-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .locate-input-row input:focus { border-color: #1a1a2e; }
        .locate-item { padding: 12px; border-bottom: 1px solid #eee; }
        .locate-item:last-child { border-bottom: none; }
        .locate-item .filename { font-weight: 500; font-size: 14px; }
        .locate-item .filepath { font-size: 12px; color: #888; margin-top: 4px; }
        .locate-item .snippet { font-size: 13px; color: #555; margin-top: 6px; background: #f8f8f0; padding: 6px 10px; border-radius: 4px; }
        .locate-results { max-height: 400px; overflow-y: auto; }

        /* Generate */
        .generate-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .generate-input-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .generate-input-row input:focus { border-color: #1a1a2e; }

        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #1a1a2e; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-left: 4px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Pro-RAG</h1>
    <span>chatId: <span id="chatIdDisplay"></span></span>
</div>

<div class="tabs">
    <div class="tab active" data-panel="upload">知识库上传</div>
    <div class="tab" data-panel="chat">RAG 对话</div>
    <div class="tab" data-panel="locate">文档定位</div>
    <div class="tab" data-panel="generate">文档生成</div>
</div>

<!-- Upload Panel -->
<div class="panel active" id="panel-upload">
    <div class="card">
        <h3>上传文件到知识库</h3>
        <div class="upload-zone" id="uploadZone">
            <div style="font-size: 36px; color: #ccc;">+</div>
            <p>点击或拖拽文件到此处（支持 PDF / Word / Markdown / TXT）</p>
            <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.md,.txt,.html,.json">
        </div>
        <div style="margin-top: 12px; display: flex; align-items: center; gap: 12px;">
            <button class="btn btn-primary" id="uploadBtn" disabled>上传入库</button>
            <span id="uploadStatus"></span>
        </div>
        <div class="result-box" id="uploadResult"></div>
    </div>
</div>

<!-- Chat Panel -->
<div class="panel" id="panel-chat">
    <div class="card">
        <h3>RAG 智能问答</h3>
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state" id="chatEmpty">输入问题开始对话</div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="输入你的问题..." />
            <button class="btn btn-primary" id="chatSendBtn">发送</button>
        </div>
    </div>
</div>

<!-- Locate Panel -->
<div class="panel" id="panel-locate">
    <div class="card">
        <h3>文档定位</h3>
        <div class="locate-input-row">
            <input type="text" id="locateInput" placeholder="输入问题，定位相关文档..." />
            <button class="btn btn-primary" id="locateBtn">搜索</button>
        </div>
        <div class="locate-results" id="locateResults"></div>
    </div>
</div>

<!-- Generate Panel -->
<div class="panel" id="panel-generate">
    <div class="card">
        <h3>文档生成</h3>
        <div class="generate-input-row">
            <input type="text" id="generateInput" placeholder="输入生成指令，例如：根据新规定撰写一份风控报告..." />
            <button class="btn btn-primary" id="generateBtn">生成</button>
        </div>
        <div id="generateOutput" style="background: #fafafa; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; min-height: 200px; max-height: 500px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; line-height: 1.6; display: none;"></div>
        <div class="empty-state" id="generateEmpty">输入指令开始生成文档</div>
    </div>
</div>

<script>
const chatId = crypto.randomUUID();
document.getElementById('chatIdDisplay').textContent = chatId.slice(0, 8) + '...';

// --- Tabs ---
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    });
});

// --- Upload ---
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const uploadStatus = document.getElementById('uploadStatus');
const uploadResult = document.getElementById('uploadResult');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        onFileSelected();
    }
});
fileInput.addEventListener('change', onFileSelected);

function onFileSelected() {
    const file = fileInput.files[0];
    if (file) {
        uploadBtn.disabled = false;
        uploadZone.innerHTML = '<div style="font-size:14px;color:#333;">已选择: <b>' + file.name + '</b> (' + (file.size / 1024).toFixed(1) + ' KB)</div><p>点击重新选择</p><input type="file" id="fileInput" accept=".pdf,.doc,.docx,.md,.txt,.html,.json">';
        document.getElementById('fileInput').addEventListener('change', onFileSelected);
    }
}

uploadBtn.addEventListener('click', async () => {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return;
    uploadBtn.disabled = true;
    uploadStatus.innerHTML = '<span class="spinner"></span> 上传中...';
    uploadResult.className = 'result-box';

    const form = new FormData();
    form.append('file', file);
    try {
        const res = await fetch('/pro-rag/upload', { method: 'POST', body: form });
        const data = await res.json();
        if (res.ok) {
            uploadResult.className = 'result-box show';
            uploadResult.textContent = JSON.stringify(data, null, 2);
            uploadStatus.textContent = '上传成功';
        } else {
            uploadResult.className = 'result-box show error';
            uploadResult.textContent = data.message || JSON.stringify(data);
            uploadStatus.textContent = '上传失败';
        }
    } catch (e) {
        uploadResult.className = 'result-box show error';
        uploadResult.textContent = e.message;
        uploadStatus.textContent = '上传失败';
    }
    setTimeout(() => uploadStatus.textContent = '', 3000);
});

// --- Chat ---
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSendBtn = document.getElementById('chatSendBtn');
const chatEmpty = document.getElementById('chatEmpty');

function appendMsg(role, text) {
    chatEmpty.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = '<div class="bubble"></div>';
    div.querySelector('.bubble').textContent = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return div.querySelector('.bubble');
}

async function sendChat() {
    const msg = chatInput.value.trim();
    if (!msg) return;
    chatInput.value = '';
    appendMsg('user', msg);
    chatSendBtn.disabled = true;

    const bubble = appendMsg('assistant', '');
    bubble.innerHTML = '<span class="spinner"></span>';

    try {
        const res = await fetch('/pro-rag/chat?message=' + encodeURIComponent(msg) + '&chatId=' + chatId);
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        bubble.textContent = '';
        let done = false;
        while (!done) {
            const { value, done: d } = await reader.read();
            done = d;
            if (value) {
                bubble.textContent += decoder.decode(value, { stream: true });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }
    } catch (e) {
        bubble.textContent = 'Error: ' + e.message;
    }
    chatSendBtn.disabled = false;
}

chatSendBtn.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

// --- Locate ---
const locateInput = document.getElementById('locateInput');
const locateBtn = document.getElementById('locateBtn');
const locateResults = document.getElementById('locateResults');

locateBtn.addEventListener('click', async () => {
    const query = locateInput.value.trim();
    if (!query) return;
    locateBtn.disabled = true;
    locateResults.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;"><span class="spinner"></span> 搜索中...</div>';

    try {
        const res = await fetch('/pro-rag/locate?query=' + encodeURIComponent(query));
        const data = await res.json();
        if (!data.length) {
            locateResults.innerHTML = '<div class="empty-state">未找到相关文档</div>';
        } else {
            locateResults.innerHTML = data.map(item =>
                '<div class="locate-item">' +
                '<div class="filename">' + (item.filename || '') + '</div>' +
                '<div class="filepath">' + (item.filePath || '') + '</div>' +
                (item.matchedContent ? '<div class="snippet">' + item.matchedContent + '</div>' : '') +
                (item.reason ? '<div style="font-size:12px;color:#888;margin-top:4px;">' + item.reason + '</div>' : '') +
                '</div>'
            ).join('');
        }
    } catch (e) {
        locateResults.innerHTML = '<div class="empty-state" style="color:#c00;">Error: ' + e.message + '</div>';
    }
    locateBtn.disabled = false;
});
locateInput.addEventListener('keydown', e => { if (e.key === 'Enter') locateBtn.click(); });

// --- Generate ---
const generateInput = document.getElementById('generateInput');
const generateBtn = document.getElementById('generateBtn');
const generateOutput = document.getElementById('generateOutput');
const generateEmpty = document.getElementById('generateEmpty');

generateBtn.addEventListener('click', async () => {
    const instruction = generateInput.value.trim();
    if (!instruction) return;
    generateInput.value = '';
    generateEmpty.style.display = 'none';
    generateOutput.style.display = 'block';
    generateOutput.innerHTML = '<span class="spinner"></span> 生成中...';
    generateBtn.disabled = true;

    try {
        const form = new FormData();
        form.append('chatId', chatId);
        form.append('instruction', instruction);
        const res = await fetch('/pro-rag/generate', { method: 'POST', body: form });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        generateOutput.textContent = '';
        let done = false;
        while (!done) {
            const { value, done: d } = await reader.read();
            done = d;
            if (value) {
                generateOutput.textContent += decoder.decode(value, { stream: true });
                generateOutput.scrollTop = generateOutput.scrollHeight;
            }
        }
    } catch (e) {
        generateOutput.textContent = 'Error: ' + e.message;
    }
    generateBtn.disabled = false;
});
generateInput.addEventListener('keydown', e => { if (e.key === 'Enter') generateBtn.click(); });
</script>
</body>
</html>
