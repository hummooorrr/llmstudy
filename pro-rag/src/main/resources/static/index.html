<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-RAG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }

        .header { background: #1a1a2e; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header span { font-size: 13px; color: #aaa; }

        .domain-tags { display: flex; gap: 6px; margin-left: auto; }
        .domain-tag { padding: 4px 14px; border-radius: 14px; font-size: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,.3); color: rgba(255,255,255,.7); transition: all .2s; }
        .domain-tag:hover { border-color: rgba(255,255,255,.6); color: #fff; }
        .domain-tag.active { background: rgba(255,255,255,.15); border-color: #fff; color: #fff; font-weight: 500; }

        .tabs { display: flex; background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 24px; }
        .tab { padding: 12px 20px; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; transition: all .2s; }
        .tab:hover { color: #333; }
        .tab.active { color: #1a1a2e; border-bottom-color: #1a1a2e; font-weight: 500; }

        .panel { display: none; max-width: 900px; margin: 24px auto; padding: 0 24px; }
        .panel.active { display: block; }

        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 20px; margin-bottom: 16px; }
        .card h3 { font-size: 15px; margin-bottom: 12px; color: #1a1a2e; }

        .upload-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all .2s; }
        .upload-zone:hover { border-color: #1a1a2e; background: #fafafa; }
        .upload-zone.dragover { border-color: #1a1a2e; background: #f0f0ff; }
        .upload-zone p { color: #888; font-size: 14px; margin-top: 8px; }
        .upload-zone input { display: none; }

        .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all .2s; }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-primary:hover { background: #2d2d4e; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

        .file-list { margin-top: 12px; max-height: 200px; overflow-y: auto; }
        .file-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; font-size: 13px; border-radius: 4px; margin-bottom: 4px; background: #f8f9fa; }
        .file-item .file-name { color: #333; }
        .file-item .file-size { color: #888; font-size: 12px; margin-left: 8px; }
        .file-item .file-remove { color: #999; cursor: pointer; margin-left: 8px; font-size: 16px; }
        .file-item .file-remove:hover { color: #c00; }
        .file-item .file-status { font-size: 12px; margin-left: 8px; }
        .file-item .file-status.success { color: #2e7d32; }
        .file-item .file-status.fail { color: #c00; }
        .file-item .file-status.pending { color: #888; }

        .upload-progress { margin-top: 12px; font-size: 13px; color: #555; display: none; }
        .upload-progress.show { display: block; }

        .result-box { background: #f8f9fa; border-radius: 6px; padding: 12px 16px; font-size: 13px; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; display: none; }
        .result-box.show { display: block; }
        .result-box.error { background: #fff0f0; color: #c00; }

        /* Chat */
        .chat-messages { height: 500px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; background: #fafafa; margin-bottom: 12px; }
        .msg { margin-bottom: 12px; display: flex; }
        .msg.user { justify-content: flex-end; }
        .msg .bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .msg.user .bubble { background: #1a1a2e; color: #fff; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble { background: #fff; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .chat-input-row input:focus { border-color: #1a1a2e; }

        /* Locate */
        .locate-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .locate-input-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .locate-input-row input:focus { border-color: #1a1a2e; }
        .locate-item { padding: 12px; border-bottom: 1px solid #eee; }
        .locate-item:last-child { border-bottom: none; }
        .locate-item .filename { font-weight: 500; font-size: 14px; }
        .locate-item .filepath { font-size: 12px; color: #888; margin-top: 4px; }
        .locate-item .snippet { font-size: 13px; color: #555; margin-top: 6px; background: #f8f8f0; padding: 6px 10px; border-radius: 4px; }
        .locate-results { max-height: 400px; overflow-y: auto; }

        /* Generate */
        .generate-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .generate-input-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .generate-input-row input:focus { border-color: #1a1a2e; }

        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #1a1a2e; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-left: 4px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Pro-RAG</h1>
    <span>chatId: <span id="chatIdDisplay"></span></span>
    <div class="domain-tags">
        <div class="domain-tag active" data-domain="bank_risk">银行风控</div>
        <div class="domain-tag" data-domain="history">历史</div>
    </div>
</div>

<div class="tabs">
    <div class="tab active" data-panel="upload">知识库上传</div>
    <div class="tab" data-panel="chat">RAG 对话</div>
    <div class="tab" data-panel="locate">文档定位</div>
    <div class="tab" data-panel="generate">文档生成</div>
</div>

<!-- Upload Panel -->
<div class="panel active" id="panel-upload">
    <div class="card">
        <h3>上传文件到知识库</h3>
        <div class="upload-zone" id="uploadZone">
            <div style="font-size: 36px; color: #ccc;">+</div>
            <p>点击或拖拽文件到此处（支持 PDF / Word / Markdown / TXT / 图片，可多选）</p>
            <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.md,.txt,.html,.json,.jpg,.jpeg,.png,.bmp,.tiff,.gif" multiple>
        </div>
        <div class="file-list" id="fileList"></div>
        <div style="margin-top: 12px; display: flex; align-items: center; gap: 12px;">
            <button class="btn btn-primary" id="uploadBtn" disabled>上传入库</button>
            <button class="btn" id="clearBtn" style="display:none;">清空列表</button>
            <span id="uploadStatus"></span>
        </div>
        <div class="upload-progress" id="uploadProgress"></div>
        <div class="result-box" id="uploadResult"></div>
    </div>
</div>

<!-- Chat Panel -->
<div class="panel" id="panel-chat">
    <div class="card">
        <h3>RAG 智能问答</h3>
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state" id="chatEmpty">输入问题开始对话</div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="输入你的问题..." />
            <button class="btn btn-primary" id="chatSendBtn">发送</button>
            <button class="btn" id="chatNewBtn" title="清空上下文，开始新对话">新对话</button>
        </div>
    </div>
</div>

<!-- Locate Panel -->
<div class="panel" id="panel-locate">
    <div class="card">
        <h3>文档定位</h3>
        <div class="locate-input-row">
            <input type="text" id="locateInput" placeholder="输入问题，定位相关文档..." />
            <button class="btn btn-primary" id="locateBtn">搜索</button>
        </div>
        <div class="locate-results" id="locateResults"></div>
    </div>
</div>

<!-- Generate Panel -->
<div class="panel" id="panel-generate">
    <div class="card">
        <h3>文档生成</h3>
        <div class="generate-input-row">
            <input type="text" id="generateInput" placeholder="输入生成指令，例如：根据新规定撰写一份风控报告..." />
            <button class="btn btn-primary" id="generateBtn">生成</button>
        </div>
        <div id="generateOutput" style="background: #fafafa; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; min-height: 200px; max-height: 500px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; line-height: 1.6; display: none;"></div>
        <div class="empty-state" id="generateEmpty">输入指令开始生成文档</div>
    </div>
</div>

<script>
function generateChatId() {
    if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        return window.crypto.randomUUID();
    }

    if (window.crypto && typeof window.crypto.getRandomValues === 'function') {
        const bytes = new Uint8Array(16);
        window.crypto.getRandomValues(bytes);
        bytes[6] = (bytes[6] & 0x0f) | 0x40;
        bytes[8] = (bytes[8] & 0x3f) | 0x80;
        const hex = Array.from(bytes, b => b.toString(16).padStart(2, '0'));
        return hex.slice(0, 4).join('') + '-' +
            hex.slice(4, 6).join('') + '-' +
            hex.slice(6, 8).join('') + '-' +
            hex.slice(8, 10).join('') + '-' +
            hex.slice(10, 16).join('');
    }

    return 'chat-' + Date.now() + '-' + Math.random().toString(16).slice(2, 10);
}

let chatId = generateChatId();
let currentDomain = 'bank_risk';
document.getElementById('chatIdDisplay').textContent = chatId.slice(0, 8) + '...';

// --- Domain Tags ---
document.querySelectorAll('.domain-tag').forEach(tag => {
    tag.addEventListener('click', () => {
        document.querySelectorAll('.domain-tag').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        currentDomain = tag.dataset.domain;
    });
});

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// --- Tabs ---
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    });
});

// --- Upload ---
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const uploadStatus = document.getElementById('uploadStatus');
const uploadResult = document.getElementById('uploadResult');
const fileList = document.getElementById('fileList');
const clearBtn = document.getElementById('clearBtn');
const uploadProgress = document.getElementById('uploadProgress');

let selectedFiles = [];

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => {
    addFiles(fileInput.files);
    fileInput.value = '';
});

function addFiles(fileListObj) {
    for (const f of fileListObj) {
        if (!selectedFiles.some(sf => sf.name === f.name && sf.size === f.size)) {
            selectedFiles.push(f);
        }
    }
    renderFileList();
}

function renderFileList() {
    fileList.innerHTML = '';
    selectedFiles.forEach((f, idx) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.id = 'file-item-' + idx;

        const nameSpan = document.createElement('span');
        nameSpan.className = 'file-name';
        nameSpan.textContent = f.name;
        item.appendChild(nameSpan);

        const sizeSpan = document.createElement('span');
        sizeSpan.className = 'file-size';
        sizeSpan.textContent = (f.size / 1024).toFixed(1) + ' KB';
        item.appendChild(sizeSpan);

        const statusSpan = document.createElement('span');
        statusSpan.className = 'file-status pending';
        statusSpan.id = 'file-status-' + idx;
        statusSpan.textContent = '待上传';
        item.appendChild(statusSpan);

        const removeBtn = document.createElement('span');
        removeBtn.className = 'file-remove';
        removeBtn.textContent = '\u00d7';
        removeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            selectedFiles.splice(idx, 1);
            renderFileList();
        });
        item.appendChild(removeBtn);

        fileList.appendChild(item);
    });
    uploadBtn.disabled = selectedFiles.length === 0;
    clearBtn.style.display = selectedFiles.length > 0 ? '' : 'none';
}

clearBtn.addEventListener('click', () => {
    selectedFiles = [];
    renderFileList();
    uploadResult.className = 'result-box';
    uploadProgress.className = 'upload-progress';
});

uploadBtn.addEventListener('click', async () => {
    if (selectedFiles.length === 0) return;
    uploadBtn.disabled = true;
    clearBtn.style.display = 'none';
    uploadProgress.className = 'upload-progress show';
    uploadResult.className = 'result-box';

    let successCount = 0;
    let failCount = 0;
    const results = [];

    for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        const statusEl = document.getElementById('file-status-' + i);
        statusEl.className = 'file-status';
        statusEl.textContent = '';
        statusEl.innerHTML = '<span class="spinner"></span>';
        uploadProgress.textContent = '上传中 (' + (i + 1) + '/' + selectedFiles.length + ')...';

        const form = new FormData();
        form.append('file', file);
        try {
            const res = await fetch('/pro-rag/upload', { method: 'POST', body: form });
            const data = await res.json();
            if (res.ok) {
                successCount++;
                statusEl.className = 'file-status success';
                statusEl.textContent = '成功 (' + data.chunks + ' 片段)';
                results.push({ file: file.name, status: 'success', chunks: data.chunks });
            } else {
                failCount++;
                statusEl.className = 'file-status fail';
                statusEl.textContent = '失败: ' + (data.message || '未知错误');
                results.push({ file: file.name, status: 'fail', message: data.message });
            }
        } catch (e) {
            failCount++;
            statusEl.className = 'file-status fail';
            statusEl.textContent = '失败: ' + e.message;
            results.push({ file: file.name, status: 'fail', message: e.message });
        }
    }

    uploadProgress.textContent = '上传完成: 成功 ' + successCount + ' 个, 失败 ' + failCount + ' 个';
    if (results.length > 0) {
        uploadResult.className = 'result-box show';
        uploadResult.textContent = JSON.stringify(results, null, 2);
    }
    selectedFiles = [];
    renderFileList();
    setTimeout(() => { uploadProgress.className = 'upload-progress'; }, 5000);
});

// --- Chat ---
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSendBtn = document.getElementById('chatSendBtn');
const chatEmpty = document.getElementById('chatEmpty');

function appendMsg(role, text) {
    chatEmpty.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = '<div class="bubble"></div>';
    div.querySelector('.bubble').textContent = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return div.querySelector('.bubble');
}

async function sendChat() {
    const msg = chatInput.value.trim();
    if (!msg) return;
    chatInput.value = '';
    appendMsg('user', msg);
    chatSendBtn.disabled = true;

    const bubble = appendMsg('assistant', '');
    bubble.innerHTML = '<span class="spinner"></span>';

    try {
        const res = await fetch('/pro-rag/chat?message=' + encodeURIComponent(msg) + '&chatId=' + chatId + '&domain=' + currentDomain);
        if (!res.ok) {
            const errData = await res.text();
            bubble.textContent = 'Error: ' + errData;
            return;
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        bubble.textContent = '';
        let done = false;
        while (!done) {
            const { value, done: d } = await reader.read();
            done = d;
            if (value) {
                bubble.textContent += decoder.decode(value, { stream: true });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }
    } catch (e) {
        bubble.textContent = 'Error: ' + e.message;
    }
    chatSendBtn.disabled = false;
}

chatSendBtn.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

// --- New Chat ---
document.getElementById('chatNewBtn').addEventListener('click', () => {
    chatMessages.innerHTML = '<div class="empty-state" id="chatEmpty">输入问题开始对话</div>';
    chatId = generateChatId();
    document.getElementById('chatIdDisplay').textContent = chatId.slice(0, 8) + '...';
});

// --- Locate ---
const locateInput = document.getElementById('locateInput');
const locateBtn = document.getElementById('locateBtn');
const locateResults = document.getElementById('locateResults');

locateBtn.addEventListener('click', async () => {
    const query = locateInput.value.trim();
    if (!query) return;
    locateBtn.disabled = true;
    locateResults.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;"><span class="spinner"></span> 搜索中...</div>';

    try {
        const res = await fetch('/pro-rag/locate?query=' + encodeURIComponent(query));
        const data = await res.json();
        if (!data.length) {
            locateResults.innerHTML = '<div class="empty-state">未找到相关文档</div>';
        } else {
            locateResults.innerHTML = '';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'locate-item';
                const filename = document.createElement('div');
                filename.className = 'filename';
                filename.textContent = item.filename || '';
                div.appendChild(filename);
                const filepath = document.createElement('div');
                filepath.className = 'filepath';
                filepath.textContent = item.filePath || '';
                div.appendChild(filepath);
                if (item.matchedContent) {
                    const snippet = document.createElement('div');
                    snippet.className = 'snippet';
                    snippet.textContent = item.matchedContent;
                    div.appendChild(snippet);
                }
                if (item.reason) {
                    const reason = document.createElement('div');
                    reason.style.cssText = 'font-size:12px;color:#888;margin-top:4px;';
                    reason.textContent = item.reason;
                    div.appendChild(reason);
                }
                locateResults.appendChild(div);
            });
        }
    } catch (e) {
        locateResults.innerHTML = '<div class="empty-state" style="color:#c00;">Error: ' + e.message + '</div>';
    }
    locateBtn.disabled = false;
});
locateInput.addEventListener('keydown', e => { if (e.key === 'Enter') locateBtn.click(); });

// --- Generate ---
const generateInput = document.getElementById('generateInput');
const generateBtn = document.getElementById('generateBtn');
const generateOutput = document.getElementById('generateOutput');
const generateEmpty = document.getElementById('generateEmpty');

generateBtn.addEventListener('click', async () => {
    const instruction = generateInput.value.trim();
    if (!instruction) return;
    generateInput.value = '';
    generateEmpty.style.display = 'none';
    generateOutput.style.display = 'block';
    generateOutput.innerHTML = '<span class="spinner"></span> 生成中...';
    generateBtn.disabled = true;

    try {
        const form = new FormData();
        form.append('chatId', chatId);
        form.append('instruction', instruction);
        form.append('domain', currentDomain);
        const res = await fetch('/pro-rag/generate', { method: 'POST', body: form });
        if (!res.ok) {
            const errData = await res.text();
            generateOutput.textContent = 'Error: ' + errData;
            return;
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        generateOutput.textContent = '';
        let done = false;
        while (!done) {
            const { value, done: d } = await reader.read();
            done = d;
            if (value) {
                generateOutput.textContent += decoder.decode(value, { stream: true });
                generateOutput.scrollTop = generateOutput.scrollHeight;
            }
        }
    } catch (e) {
        generateOutput.textContent = 'Error: ' + e.message;
    }
    generateBtn.disabled = false;
});
generateInput.addEventListener('keydown', e => { if (e.key === 'Enter') generateBtn.click(); });
</script>
</body>
</html>
