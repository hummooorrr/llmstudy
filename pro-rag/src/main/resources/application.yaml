spring:
  application:
    name: pro-rag
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.zhipuai.autoconfigure.ZhiPuAiChatAutoConfiguration
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  # 主 datasource 给 pgvector 用
  datasource:
    url: ${PG_URL:jdbc:postgresql://localhost:5433/rag_test}
    username: ${PG_USERNAME:pgvector}
    password: ${PG_PASSWORD:}
  ai:
    zhipuai:
      api-key: ${ZHIPU_API_KEY:}
      chat:
        enabled: false
      embedding:
        options:
          model: ${pro-rag.models.embedding}
          dimensions: ${PRO_RAG_EMBEDDING_DIMENSIONS:2048}
    openai:
      api-key: ${DEEPSEEK_API_KEY:${ZHIPU_API_KEY:}}
      base-url: https://api.deepseek.com
      embedding:
        enabled: false
      chat:
        options:
          model: ${pro-rag.models.chat}
    vectorstore:
      pgvector:
        # 向量索引类型
        index-type: NONE
        # 距离度量，余弦值
        distance-type: COSINE_DISTANCE
        # 向量维度
        dimensions: 2048
        # 批量处理大小
        max-document-batch-size: 9
        # 启动时是否自动创建表
        initialize-schema: true
        # 创建的表名
        table-name: pro_vector_st
server:
  port: ${SERVER_PORT:28692}

spring.servlet.multipart:
  max-file-size: 1024MB
  max-request-size: 1024MB

# 文件上传目录
pro-rag:
  models:
    chat: ${PRO_RAG_CHAT_MODEL:deepseek-reasoner}
    embedding: ${PRO_RAG_EMBEDDING_MODEL:embedding-3}
    vision: ${PRO_RAG_VISION_MODEL:glm-4.6v}
    rerank: ${PRO_RAG_RERANK_MODEL:rerank}
  upload-dir: ${PRO_RAG_UPLOAD_DIR:./pro-rag-files}
  generated-dir: ${PRO_RAG_GENERATED_DIR:./pro-rag-generated}
  cleanup:
    enabled: ${PRO_RAG_CLEANUP_ENABLED:true}
    upload-retention-days: ${PRO_RAG_UPLOAD_RETENTION_DAYS:7}
    generated-retention-days: ${PRO_RAG_GENERATED_RETENTION_DAYS:7}
    cron: ${PRO_RAG_CLEANUP_CRON:0 30 3 * * ?}
    dry-run: ${PRO_RAG_CLEANUP_DRY_RUN:false}
  rerank:
    enabled: ${PRO_RAG_RERANK_ENABLED:true}
  # 对话/生成记忆（持久化到 MySQL）
  chat-memory:
    # 对话 scope 保留多少条历史消息（1 条 = 1 个 user / assistant 消息）
    chat-window: ${PRO_RAG_CHAT_MEMORY_WINDOW:30}
    # 文档生成 scope 保留多少条历史消息（需要放得大一些，每一轮 assistant 往往是完整文档）
    generate-window: ${PRO_RAG_GENERATE_MEMORY_WINDOW:30}
    # 对话列表默认返回最近多少条
    list-limit: ${PRO_RAG_CHAT_MEMORY_LIST_LIMIT:200}
    # MySQL 连接（独立于主 datasource）
    datasource:
      url: ${MYSQL_URL:jdbc:mysql://localhost:3306/pro_rag?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:root}
      driver-class-name: com.mysql.cj.jdbc.Driver
    # 启动时是否自动建表
    initialize-schema: ${PRO_RAG_CHAT_MEMORY_INIT_SCHEMA:true}
  # 分块参数配置：default 为兜底，profiles 按文件类型/业务场景覆盖
  chunking:
    default:
      strategy: overlap-paragraph
      chunk-size: 400
      overlap: 100
    profiles:
      markdown:
        strategy: markdown-header
        headers:
          - "# "
          - "## "
          - "### "
        strip-headings: false
        parent-child-model: true
      word:
        strategy: word-header
        heading-levels: [ 1, 2, 3 ]
        chunk-size: 500
        overlap: 100
        parent-child-model: true
      pdf-text:
        strategy: overlap-paragraph
        chunk-size: 400
        overlap: 100
      pdf-scanned:
        strategy: overlap-paragraph
        chunk-size: 600
        overlap: 150
      image:
        strategy: overlap-paragraph
        chunk-size: 800
        overlap: 0
  # 检索 / 融合 / 重排参数
  # 注意：rerank.final-top-k 同时作为 prompt 里材料数和前端 reference 卡片数（保证 1:1 对应）
  retrieval:
    vector-top-k: 10
    keyword-top-k: 5
    similarity-threshold: 0.35
    max-rewrite-queries: 3
    directive-vector-top-k: 8
    directive-similarity-threshold: 0.20
    locate:
      vector-top-k: 10
      keyword-top-k: 6
      similarity-threshold: 0.35
      snippet-limit: 3
    rerank:
      rrf-k: 60
      final-top-k: 6
  # 文档解析开关（表格/图片结构化、VL 限流）
  parsing:
    structured-enabled: ${PRO_RAG_STRUCTURED_PARSE_ENABLED:true}
    max-images-per-doc: ${PRO_RAG_MAX_IMAGES_PER_DOC:20}
    min-image-dimension: 80
