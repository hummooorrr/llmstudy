spring:
  application:
    name: pro-rag
  elasticsearch:
    uris: http://localhost:9200
  datasource:
    url: jdbc:postgresql://localhost:5433/rag_test
    username: pgvector
    password: pgvector
  ai:
    zhipuai:
      api-key: 1c365c4db27843afa4ad26b73c93e858.XSTK3rxbv1n54d1C
      embedding:
        options:
          model: embedding-3
          dimensions: 2048
      chat:
        options:
          model: glm-5.1
    vectorstore:
      pgvector:
        # 向量索引类型
        index-type: NONE
        # 距离度量，余弦值
        distance-type: COSINE_DISTANCE
        # 向量维度
        dimensions: 2048
        # 批量处理大小
        max-document-batch-size: 9
        # 启动时是否自动创建表
        initialize-schema: true
        # 创建的表名
        table-name: pro_vector_st
server:
  port: 28689

spring.servlet.multipart:
  max-file-size: 1024MB
  max-request-size: 1024MB

# 文件上传目录
pro-rag:
  upload-dir: ./pro-rag-files
  generated-dir: ./pro-rag-generated
  rerank:
    enabled: true
