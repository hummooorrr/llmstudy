spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/llmstudy?useSSL=false&serverTimezone=UTC&characterEncoding=utf8}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: llmstudy
  ai:
    chat:
      memory:
        repository:
          jdbc:
            platform: mysql
            initialize-schema: always
    zhipuai:
      api-key: ${ZHIPU_API_KEY:}
      chat:
        options:
          model: ${SPRINGAI_CHAT_MODEL:glm-5.1}

server:
  port: ${SERVER_PORT:28688}
