services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pro-rag-postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_DB: rag_test
      POSTGRES_USER: ${PG_USERNAME:-pgvector}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?set PG_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    # 对话记忆 / 会话元信息持久化
    image: mysql:8.0
    container_name: pro-rag-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pro_rag}
      MYSQL_USER: ${MYSQL_USERNAME:-pro_rag}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./initdb/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.elasticsearch
    image: pro-rag-elasticsearch:8.19.0-ik
    container_name: pro-rag-elasticsearch
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  app:
    build:
      context: ../..
      dockerfile: deploy/pro-rag/Dockerfile
    container_name: pro-rag-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      SERVER_PORT: 28692
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      PRO_RAG_CHAT_MODEL: ${PRO_RAG_CHAT_MODEL}
      PRO_RAG_EMBEDDING_MODEL: ${PRO_RAG_EMBEDDING_MODEL}
      PRO_RAG_EMBEDDING_DIMENSIONS: ${PRO_RAG_EMBEDDING_DIMENSIONS}
      PRO_RAG_VECTOR_DIMENSIONS: ${PRO_RAG_VECTOR_DIMENSIONS}
      PRO_RAG_VISION_MODEL: ${PRO_RAG_VISION_MODEL}
      PRO_RAG_RERANK_MODEL: ${PRO_RAG_RERANK_MODEL}
      PRO_RAG_RERANK_ENABLED: ${PRO_RAG_RERANK_ENABLED}
      PRO_RAG_RERANK_BASE_URL: ${PRO_RAG_RERANK_BASE_URL}
      PG_URL: jdbc:postgresql://postgres:5432/rag_test
      PG_USERNAME: ${PG_USERNAME}
      PG_PASSWORD: ${PG_PASSWORD}
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      PRO_RAG_CHAT_MEMORY_WINDOW: ${PRO_RAG_CHAT_MEMORY_WINDOW}
      PRO_RAG_GENERATE_MEMORY_WINDOW: ${PRO_RAG_GENERATE_MEMORY_WINDOW}
      PRO_RAG_UPLOAD_DIR: /data/uploads
      PRO_RAG_GENERATED_DIR: /data/generated
      PRO_RAG_STRUCTURED_PARSE_ENABLED: ${PRO_RAG_STRUCTURED_PARSE_ENABLED}
      PRO_RAG_MAX_IMAGES_PER_DOC: ${PRO_RAG_MAX_IMAGES_PER_DOC}
      JAVA_OPTS: ${JAVA_OPTS}
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/generated:/data/generated

  nginx:
    image: nginx:1.27-alpine
    container_name: pro-rag-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx:/etc/nginx/auth:ro

volumes:
  postgres-data:
  elasticsearch-data:
  mysql-data:
