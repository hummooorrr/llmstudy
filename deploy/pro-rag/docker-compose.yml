services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pro-rag-postgres
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_DB: rag_test
      POSTGRES_USER: ${PG_USERNAME:-pgvector}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?set PG_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
    container_name: pro-rag-elasticsearch
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  app:
    build:
      context: ../..
      dockerfile: deploy/pro-rag/Dockerfile
    container_name: pro-rag-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: 28692
      PG_URL: jdbc:postgresql://postgres:5432/rag_test
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      PRO_RAG_UPLOAD_DIR: /data/uploads
      PRO_RAG_GENERATED_DIR: /data/generated
      PRO_RAG_STRUCTURED_PARSE_ENABLED: ${PRO_RAG_STRUCTURED_PARSE_ENABLED:-true}
      PRO_RAG_MAX_IMAGES_PER_DOC: ${PRO_RAG_MAX_IMAGES_PER_DOC:-20}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1536m}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/generated:/data/generated

  nginx:
    image: nginx:1.27-alpine
    container_name: pro-rag-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx:/etc/nginx/auth:ro

volumes:
  postgres-data:
  elasticsearch-data:
